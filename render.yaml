# Render Configuration
# Este archivo configura el deploy automático en Render

services:
  - type: web
    name: api-licencias
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT "app:create_app('production')"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: licencias-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GRACE_PERIOD_HOURS
        value: "24"

databases:
  - name: licencias-db
    databaseName: licencias_db
    user: licencias_user
    plan: free  # Cambiar a 'starter' o superior para producción
