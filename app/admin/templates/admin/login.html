{% extends 'admin/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="login-container">
    <h2>🔐 Acceso Administrativo</h2>
    <form method="POST" action="{{ url_for('admin.login') }}">
        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-block">Iniciar Sesión</button>
    </form>
    <p style="margin-top: 20px; text-align: center; color: #666; font-size: 0.9rem;">
        Panel de administración del API de Licencias
    </p>
</div>
{% endblock %}
